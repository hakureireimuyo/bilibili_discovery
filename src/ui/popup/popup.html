<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilibili Discovery</title>
    <!-- 共享样式库 -->
    <link rel="stylesheet" href="../shared/theme-vars.css" />
    <link rel="stylesheet" href="../shared/base.css" />
    <link rel="stylesheet" href="../shared/utils.css" />
    <link rel="stylesheet" href="../shared/components.css" />
    <!-- 页面特定样式 -->
    <link rel="stylesheet" href="./popup.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <div class="app">
      <div id="popup-content">
        <header class="hero">
          <div class="hero-mark">
            <span class="hero-logo"><i class="fab fa-bilibili"></i></span>
            <div>
              <h1>观察窗口</h1>
            </div>
          </div>

          <div class="hero-copy">
            <p id="hero-status" class="hero-status is-loading">
              <i class="fas fa-circle-notch fa-spin"></i>
              <span>正在整理你的观察窗口...</span>
            </p>
          </div>
        </header>

        <section class="panel">
          <div class="panel-head">
            <h2>核心数据</h2>
          </div>

          <div id="focus-grid" class="focus-grid"></div>
        </section>

        <footer class="footer-actions">
          <button id="btn-open-workbench" type="button" class="primary-action">
            <strong>打开工作台 →</strong>
            <i class="fas fa-arrow-up-right-from-square"></i>
          </button>
        </footer>
      </div>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
