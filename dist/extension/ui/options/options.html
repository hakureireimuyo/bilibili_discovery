<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bilibili Discovery Options</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <div class="app">
      <h1>设置</h1>
      <div class="links">
        <a id="open-stats" href="#">查看统计信息</a>
      </div>
      <label>
        缓存时间（小时）
        <input id="cache-hours" type="number" min="1" max="168" />
      </label>
      <label>
        用户 UID
        <input id="user-id" type="number" min="1" placeholder="Bilibili UID" />
      </label>
      <label>
        API Base URL
        <input id="api-base-url" type="text" placeholder="https://api.openai.com" />
      </label>
      <label>
        Model
        <input id="api-model" type="text" placeholder="gpt-4o-mini" />
      </label>
      <label>
        API Key
        <input id="api-key" type="password" placeholder="sk-..." />
      </label>
      <button id="save-btn">保存</button>
      <p id="status" class="status"></p>
    </div>
    <script type="module" src="./options.js"></script>
  </body>
</html>
